augmentation:
  random_flip:
    enabled: true
    prob: 0.5
    spatial_axis: [0, 1]

  random_rotation:
    enabled: true
    prob: 0.2
    range_x: 10
    range_y: 10
    range_z: 5

  random_affine:
    enabled: true
    prob: 0.2
    rotate_range: [0.1, 0.1, 0.05]
    scale_range: [0.1, 0.1, 0.05]

  elastic_deformation:
    enabled: true
    prob: 0.15
    sigma_range: [5.0, 8.0]
    magnitude_range: [50.0, 100.0]

  gaussian_noise:
    enabled: true
    prob: 0.15

  gaussian_blur:
    enabled: true
    prob: 0.10

  gamma:
    enabled: true
    prob: 0.20

  intensity_shift:
    enabled: true
    prob: 0.15

  zoom:
    enabled: true
    prob: 0.15

  coarse_dropout:
    enabled: true
    prob: 0.10

  foreground_crop:
    enabled: true