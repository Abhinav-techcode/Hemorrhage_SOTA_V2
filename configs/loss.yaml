# Loss Ablation Framework
weighting_strategy: "uncertainty"  # 'static', 'learnable', 'uncertainty'

loss:
  dice:
    enabled: true
    weight: auto  # Use 'auto' for uncertainty/learnable, or a float for static
    params: { sigmoid: true }
  
  focal:
    enabled: true
    weight: auto
    params: { gamma: 2.0 }
    
  boundary:
    enabled: true
    weight: auto
    params: {}

deep_supervision:
  weights:
    full: 1.00
    half: 0.50
    quarter: 0.25