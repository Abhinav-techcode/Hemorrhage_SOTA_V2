weighting_strategy: "uncertainty"  # 'static', 'learnable', 'uncertainty'
losses:
  - name: "dice"
    weight: 1.0
    params: { sigmoid: true }
  - name: "focal"
    weight: 0.5
    params: { gamma: 2.0 }
  - name: "boundary"
    weight: 0.2
    params: {}

deep_supervision:
  weights:
    full: 1.00
    half: 0.50
    quarter: 0.25