# Loss Ablation Framework
weighting_strategy: "static"  # 'static', 'learnable', 'uncertainty'

loss:
  dice:
    enabled: true
    weight: 1.0
    params: { sigmoid: true }
  
  focal:
    enabled: true
    weight: 0.4
    params: { gamma: 2.0 }
    
  boundary:
    enabled: false
    weight: 1.0
    params: {}

deep_supervision:
  weights:
    full: 1.00
    half: 0.50
    quarter: 0.25